name: Kiem Tra Va Dong Goi Code

on:
  push:
    branches: [ "main" ]

jobs:
  kiem-tra-code:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Lay code ve may ao
        uses: actions/checkout@v4

      - name: 2. Cai dat Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 3. Chay Test
        # Bước này sẽ chạy file CalculatorTest.java của bạn
        run: mvn test